<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canucks Jerseys — Admin</title>
<script src="data.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:  #000;
  --white:  #fff;
  --grey:   #767676;
  --lgrey:  #b0b0b0;
  --border: #e0e0e0;
  --bg:     #fff;
  --f: "Helvetica Neue", Helvetica, Arial, sans-serif;
  --hdr1: 80px;
}

html, body { height: 100%; overflow-x: hidden; }
body { font-family: var(--f); background: var(--white); color: var(--black); font-size: 16px; line-height: 1.4; -webkit-font-smoothing: antialiased; }

header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--white); border-bottom: 1px solid var(--border); }
.hdr-top { height: var(--hdr1); display: flex; align-items: center; justify-content: center; padding: 0 24px; position: relative; }
.logo { height: 40px; }
.hdr-count { position: absolute; left: 24px; font-size: 13px; color: var(--grey); letter-spacing: 0.04em; }
.hdr-view { position: absolute; right: 24px; font-size: 14px; color: var(--grey); text-decoration: none; letter-spacing: 0.04em; }
.hdr-view:hover { color: var(--black); }
.hdr-export { position: absolute; right: 120px; font-size: 14px; color: var(--grey); text-decoration: none; letter-spacing: 0.04em; }
.hdr-export:hover { color: var(--black); }

main { padding: calc(var(--hdr1) + 48px) 48px 100px; max-width: none; margin: 0; }

.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
.card { display: flex; flex-direction: column; min-width: 0; }
.card.dragging { opacity: 0.4; }
.card.drag-over { outline: 2px solid var(--black); outline-offset: 2px; }
.card-thumb-wrap { position: relative; aspect-ratio: 4/3; background: var(--bg); overflow: hidden; }
.card-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-cost { position: absolute; bottom: 0; right: 0; background: rgba(0,0,0,0.55); color: #fff; font-size: 10px; letter-spacing: 0.02em; padding: 3px 6px; opacity: 0; transition: opacity 0.15s; pointer-events: none; }
.card:hover .card-cost { opacity: 1; }
.card-move { position: absolute; top: 4px; left: 4px; right: 4px; display: flex; flex-direction: row; justify-content: space-between; }
.card-move button { width: 24px; height: 20px; font-size: 12px; color: var(--black); background: rgba(255,255,255,0.85); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.card-move button:hover { background: #fff; }
.card-move button:disabled { color: var(--lgrey); cursor: default; }
.card-info { margin-top: 10px; }
.card-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-sub { font-size: 12px; color: var(--grey); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.card-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 10px; }
.card-edit { font-size: 13px; color: var(--grey); background: none; border: none; cursor: pointer; padding: 0; letter-spacing: 0.04em; }
.card-edit:hover { color: var(--black); }
.card-status { font-family: var(--f); font-size: 12px; color: var(--grey); background: transparent; border: 1px solid var(--border); padding: 6px 8px; cursor: pointer; -webkit-appearance: none; appearance: none; border-radius: 0; flex-shrink: 0; }

.empty { padding: 80px 0; text-align: center; color: var(--lgrey); font-size: 15px; }

#fab { position: fixed; bottom: 32px; right: 32px; width: 60px; height: 60px; background: var(--black); color: var(--white); border: none; cursor: pointer; font-size: 30px; font-weight: 300; display: flex; align-items: center; justify-content: center; z-index: 99; border-radius: 50%; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; }
.overlay.on { display: block; }
.panel { position: fixed; top: 0; right: 0; bottom: 0; width: 560px; max-width: 100%; background: var(--white); z-index: 201; transform: translateX(100%); transition: transform 0.25s ease; overflow-y: auto; padding: 36px 36px 120px; }
.overlay.on .panel { transform: translateX(0); }

.panel-title { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 32px; display: flex; align-items: center; justify-content: space-between; }
.btn-delete-link { font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #c0392b; background: none; border: none; cursor: pointer; }
.btn-delete-link:hover { color: #92271f; }

.patch-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.patch-row input { flex: 1; border: none; border-bottom: 1px solid var(--border); padding: 9px 0; font-family: var(--f); font-size: 16px; color: var(--black); background: transparent; outline: none; }
.patch-row input:focus { border-color: var(--black); }
.patch-rm { width: 26px; height: 26px; flex-shrink: 0; background: none; border: none; cursor: pointer; font-size: 15px; color: var(--grey); display: flex; align-items: center; justify-content: center; }
.patch-rm:hover { color: var(--black); }
.patch-add { display: block; font-size: 12px; color: var(--grey); background: none; border: none; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 0; margin-bottom: 22px; }
.patch-add:hover { color: var(--black); }
.field { margin-bottom: 22px; }
.field label { display: block; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--lgrey); margin-bottom: 8px; }
.field input, .field select { width: 100%; border: none; border-bottom: 1px solid var(--border); padding: 9px 0; font-family: var(--f); font-size: 16px; color: var(--black); background: transparent; outline: none; transition: border-color 0.15s; -webkit-appearance: none; appearance: none; border-radius: 0; }
.field input:focus, .field select:focus { border-color: var(--black); }
.field-row { display: flex; gap: 18px; }
.field-row .field { flex: 1; }
.field-row .field-player { flex: 2; }
.field-section { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--lgrey); margin: 32px 0 18px; padding-top: 22px; }

.img-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 14px; }
.img-cell { position: relative; aspect-ratio: 4/3; background: var(--bg); overflow: hidden; }
.img-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-path { position: absolute; bottom: 0; left: 0; right: 0; padding: 4px 6px; background: rgba(0,0,0,0.55); color: var(--white); font-size: 10px; letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.img-rm { position: absolute; top: 4px; right: 4px; width: 26px; height: 26px; background: rgba(255,255,255,0.9); border: none; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: var(--black); }
.img-mv { position: absolute; top: 4px; left: 4px; display: flex; gap: 4px; }
.img-mv button { width: 26px; height: 26px; background: rgba(255,255,255,0.9); border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--black); }
.img-upload { aspect-ratio: 4/3; background: var(--bg); border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; color: var(--lgrey); letter-spacing: 0.08em; text-transform: uppercase; text-align: center; padding: 16px; transition: background 0.15s, color 0.15s; }
.img-upload.drag-over { background: var(--border); color: var(--grey); }
.img-upload input { display: none; }

.panel-actions { display: flex; gap: 14px; margin-top: 36px; }
.btn-save { flex: 1; padding: 18px; background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--f); font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
.btn-cancel { padding: 18px 24px; background: none; color: var(--grey); border: none; cursor: pointer; font-family: var(--f); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; }
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <span class="hdr-count" id="hdr-count"></span>
    <img class="logo" src="images/Frame 1.png" alt="Canucks Jerseys">
    <a class="hdr-export" href="#" id="btn-export">Export Data ↓</a>
    <a class="hdr-view" href="collection.html" target="_blank">View Site →</a>
  </div>
</header>

<main>
  <div id="list"></div>
</main>

<button id="fab">+</button>

<div class="overlay" id="overlay">
  <div class="panel">
    <div class="panel-title">
      <span id="panel-title">Edit Listing</span>
      <button class="btn-delete-link" id="btn-delete">Delete</button>
    </div>

    <label class="img-upload" id="img-upload">
      + Add Photos (or drag &amp; drop)
      <input type="file" id="img-input" accept="image/*" multiple>
    </label>
    <div class="img-grid" id="img-grid"></div>

    <div class="field-row" style="margin-top: 36px;">
      <div class="field">
        <label>Category</label>
        <select id="f-category">
          <option value="">—</option>
          <option value="canucks">Canucks</option>
          <option value="canada">Canada</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Team</label>
        <select id="f-team">
          <option value="">—</option>
          <option>Vancouver Canucks</option>
          <option>Team Canada</option>
          <option>New York Knicks</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Title</label>
      <input id="f-title" type="text">
    </div>
    <div class="field-row">
      <div class="field field-player">
        <label>Player</label>
        <input id="f-player" type="text">
      </div>
      <div class="field">
        <label>Number</label>
        <input id="f-number" type="text">
      </div>
      <div class="field">
        <label>Designation</label>
        <select id="f-designation">
          <option value="Blank">Blank</option>
          <option value="C">C</option>
          <option value="A">A</option>
        </select>
      </div>
    </div>

    <div class="field-section">Patches</div>
    <div id="patch-list"></div>
    <button type="button" class="patch-add" id="btn-add-patch">+ Add Patch</button>

    <div class="field-section">Details</div>
    <div class="field-row">
      <div class="field">
        <label>Manufacturer</label>
        <select id="f-manufacturer">
          <option value="">—</option>
          <option>CCM</option>
          <option>Reebok</option>
          <option>Adidas</option>
          <option>Fanatics</option>
          <option>Bauer</option>
          <option>Nike</option>
        </select>
      </div>
      <div class="field">
        <label>Model</label>
        <input id="f-model" type="text">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Year</label>
        <input id="f-year" type="text">
      </div>
      <div class="field">
        <label>Size</label>
        <select id="f-size">
          <option value="">—</option>
          <option>52</option>
          <option>54</option>
          <option>56</option>
          <option>58</option>
          <option>58 Goalie Cut</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Type</label>
        <select id="f-jerseyType">
          <option value="">—</option>
          <option>Retail On-Ice</option>
          <option>Retail On-Court</option>
          <option>Game Worn</option>
          <option>Team Issued</option>
          <option>Replica/Indo Authentic</option>
        </select>
      </div>
      <div class="field">
        <label>Country</label>
        <select id="f-country">
          <option value="">—</option>
          <option>Made in Canada</option>
          <option>Made in Indonesia</option>
          <option>Made in Thailand</option>
        </select>
      </div>
    </div>

    <div class="field-section">Admin Only</div>
    <div class="field-row">
      <div class="field">
        <label>Condition</label>
        <select id="f-condition">
          <option value="">—</option>
          <option>New with Tags</option>
          <option>New without Tags</option>
          <option>Very Good</option>
          <option>Good</option>
          <option>Used</option>
        </select>
      </div>
      <div class="field">
        <label>Total Cost</label>
        <input id="f-cost" type="text">
      </div>
    </div>

    <div class="panel-actions">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save</button>
    </div>
  </div>
</div>

<script>
var _initial = typeof GALLERY_DATA !== 'undefined' ? GALLERY_DATA : [];
_initial.forEach(function(p) { if (!p.status) p.status = 'Public'; });
var S = { products: _initial };
var editingId = null;
var formImages = [];
var formPatches = [];

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function save() {}

document.getElementById('btn-export').addEventListener('click', function(e) {
  e.preventDefault();
  var blob = new Blob(['var GALLERY_DATA = ' + JSON.stringify(S.products, null, 2) + ';'], { type: 'application/javascript' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'data.js';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

function render() {
  var list = document.getElementById('list');
  var total = S.products.reduce(function(sum, p) {
    var n = parseFloat(String(p.cost || '').replace(/[^0-9.]/g, ''));
    return sum + (isNaN(n) ? 0 : n);
  }, 0);
  var totalStr = '$' + total.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  document.getElementById('hdr-count').textContent = S.products.length + ' ' + (S.products.length === 1 ? 'Jersey' : 'Jerseys') + ' · ' + totalStr;
  if (!S.products.length) { list.innerHTML = '<div class="empty">No listings yet. Tap + to add one.</div>'; return; }

  var pub = S.products.filter(function(p) { return p.status !== 'Draft'; });
  var draft = S.products.filter(function(p) { return p.status === 'Draft'; });
  var ordered = pub.concat(draft);
  var changed = ordered.some(function(p, i) { return p !== S.products[i]; });
  if (changed) { S.products = ordered; save(); }

  list.innerHTML = '<div class="grid">' + S.products.map(function(p, i) {
    var sub = [p.manufacturer, p.year].filter(Boolean).join(' · ');
    var img = (p.images && p.images.length) ? p.images[0] : '';
    var last = S.products.length - 1;
    return '<div class="card" data-i="' + i + '" draggable="true">' +
      '<div class="card-thumb-wrap">' +
        (img ? '<img class="card-thumb" src="' + img + '">' : '') +
        (p.cost ? '<div class="card-cost">' + esc(p.cost) + '</div>' : '') +
        '<div class="card-move">' +
          '<button class="card-up" data-i="' + i + '"' + (i === 0 ? ' disabled' : '') + '>‹</button>' +
          '<button class="card-down" data-i="' + i + '"' + (i === last ? ' disabled' : '') + '>›</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-info">' +
        '<div class="card-title">' + esc(p.title || p.team || 'Untitled') + '</div>' +
        '<div class="card-sub">' + esc([p.team, p.player, sub].filter(Boolean).join(' — ')) + '</div>' +
      '</div>' +
      '<div class="card-actions">' +
        '<select class="card-status" data-i="' + i + '">' +
          '<option value="Public"' + (p.status !== 'Draft' ? ' selected' : '') + '>Public</option>' +
          '<option value="Draft"'  + (p.status === 'Draft' ? ' selected' : '') + '>Draft</option>' +
        '</select>' +
        '<button class="card-edit" data-id="' + esc(p.id) + '">Edit</button>' +
      '</div>' +
    '</div>';
  }).join('') + '</div>';

  list.querySelectorAll('.card-edit').forEach(function(b) {
    b.addEventListener('click', function() { openForm(b.dataset.id); });
  });
  list.querySelectorAll('.card-status').forEach(function(sel) {
    sel.addEventListener('change', function() {
      S.products[+sel.dataset.i].status = sel.value;
      save();
    });
  });
  list.querySelectorAll('.card-up').forEach(function(b) {
    b.addEventListener('click', function() { move(+b.dataset.i, -1); });
  });
  list.querySelectorAll('.card-down').forEach(function(b) {
    b.addEventListener('click', function() { move(+b.dataset.i, 1); });
  });

  var cards = list.querySelectorAll('.card');
  cards.forEach(function(card) {
    card.addEventListener('dragstart', function(e) {
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.i);
    });
    card.addEventListener('dragend', function() {
      card.classList.remove('dragging');
      cards.forEach(function(c) { c.classList.remove('drag-over'); });
    });
    card.addEventListener('dragover', function(e) {
      e.preventDefault();
      if (card.classList.contains('dragging')) return;
      cards.forEach(function(c) { c.classList.remove('drag-over'); });
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', function() {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', function(e) {
      e.preventDefault();
      card.classList.remove('drag-over');
      var from = +e.dataTransfer.getData('text/plain');
      var to = +card.dataset.i;
      if (from === to) return;
      var item = S.products.splice(from, 1)[0];
      S.products.splice(to, 0, item);
      save(); render();
    });
  });
}

function move(i, dir) {
  var j = i + dir;
  if (j < 0 || j >= S.products.length) return;
  var item = S.products.splice(i, 1)[0];
  S.products.splice(j, 0, item);
  save(); render();
}

function openForm(id) {
  editingId = id;
  var p = id ? S.products.filter(function(x) { return x.id === id; })[0] : {};
  formImages = (p.images || []).map(function(src) { return { path: src, preview: src }; });
  document.getElementById('panel-title').textContent = id ? 'Edit Listing' : 'New Listing';
  document.getElementById('f-category').value = p.category || '';
  document.getElementById('f-team').value = p.team || '';
  document.getElementById('f-title').value = p.title || '';
  document.getElementById('f-player').value = p.player || '';
  document.getElementById('f-number').value = p.number || '';
  document.getElementById('f-designation').value = p.designation || 'Blank';
  document.getElementById('f-manufacturer').value = p.manufacturer || '';
  document.getElementById('f-model').value = p.model || '';
  document.getElementById('f-year').value = p.year || '';
  document.getElementById('f-size').value = p.size || '';
  document.getElementById('f-country').value = p.country || '';
  document.getElementById('f-jerseyType').value = p.jerseyType || '';
  document.getElementById('f-condition').value = p.condition || '';
  document.getElementById('f-cost').value = p.cost || '';
  formPatches = [p.patch1, p.patch2, p.patch3].filter(Boolean);
  document.getElementById('btn-delete').style.display = id ? '' : 'none';
  renderImages();
  renderPatches();
  document.getElementById('overlay').classList.add('on');
}

function closeForm() {
  document.getElementById('overlay').classList.remove('on');
  editingId = null;
}

function renderImages() {
  var grid = document.getElementById('img-grid');
  grid.innerHTML = formImages.map(function(item, i) {
    return '<div class="img-cell">' +
      '<img src="' + esc(item.preview) + '">' +
      '<div class="img-path">' + esc(item.path) + '</div>' +
      '<button class="img-rm" data-i="' + i + '">×</button>' +
      '<div class="img-mv">' +
        (i > 0 ? '<button class="img-left" data-i="' + i + '">‹</button>' : '') +
        (i < formImages.length - 1 ? '<button class="img-right" data-i="' + i + '">›</button>' : '') +
      '</div>' +
    '</div>';
  }).join('');
  grid.querySelectorAll('.img-rm').forEach(function(b) {
    b.addEventListener('click', function() { formImages.splice(+b.dataset.i, 1); renderImages(); });
  });
  grid.querySelectorAll('.img-left').forEach(function(b) {
    b.addEventListener('click', function() {
      var i = +b.dataset.i;
      var tmp = formImages[i-1]; formImages[i-1] = formImages[i]; formImages[i] = tmp;
      renderImages();
    });
  });
  grid.querySelectorAll('.img-right').forEach(function(b) {
    b.addEventListener('click', function() {
      var i = +b.dataset.i;
      var tmp = formImages[i+1]; formImages[i+1] = formImages[i]; formImages[i] = tmp;
      renderImages();
    });
  });
}

function renderPatches() {
  var list = document.getElementById('patch-list');
  list.innerHTML = formPatches.map(function(val, i) {
    return '<div class="patch-row">' +
      '<input class="patch-input" data-i="' + i + '" type="text" placeholder="Patch ' + (i+1) + '" value="' + esc(val) + '">' +
      '<button class="patch-rm" data-i="' + i + '">×</button>' +
    '</div>';
  }).join('');
  list.querySelectorAll('.patch-input').forEach(function(inp) {
    inp.addEventListener('input', function() { formPatches[+inp.dataset.i] = inp.value; });
  });
  list.querySelectorAll('.patch-rm').forEach(function(b) {
    b.addEventListener('click', function() { formPatches.splice(+b.dataset.i, 1); renderPatches(); });
  });
  document.getElementById('btn-add-patch').style.display = formPatches.length < 3 ? '' : 'none';
}

document.getElementById('btn-add-patch').addEventListener('click', function() {
  formPatches.push('');
  renderPatches();
});

function addImageFiles(files) {
  Array.prototype.slice.call(files).forEach(function(file) {
    if (!/^image\//.test(file.type)) return;
    formImages.push({ path: 'images/' + file.name, preview: URL.createObjectURL(file) });
  });
  renderImages();
}

document.getElementById('img-input').addEventListener('change', function(e) {
  addImageFiles(e.target.files);
  e.target.value = '';
});

var imgUpload = document.getElementById('img-upload');
imgUpload.addEventListener('dragover', function(e) {
  e.preventDefault();
  imgUpload.classList.add('drag-over');
});
imgUpload.addEventListener('dragleave', function() {
  imgUpload.classList.remove('drag-over');
});
imgUpload.addEventListener('drop', function(e) {
  e.preventDefault();
  imgUpload.classList.remove('drag-over');
  addImageFiles(e.dataTransfer.files);
});

document.getElementById('fab').addEventListener('click', function() { openForm(null); });
document.getElementById('btn-cancel').addEventListener('click', closeForm);
document.getElementById('overlay').addEventListener('click', function(e) { if (e.target.id === 'overlay') closeForm(); });

document.getElementById('btn-save').addEventListener('click', function() {
  var data = {
    category: document.getElementById('f-category').value,
    team: document.getElementById('f-team').value.trim(),
    title: document.getElementById('f-title').value.trim(),
    player: document.getElementById('f-player').value.trim(),
    number: document.getElementById('f-number').value.trim(),
    designation: document.getElementById('f-designation').value,
    manufacturer: document.getElementById('f-manufacturer').value.trim(),
    model: document.getElementById('f-model').value.trim(),
    year: document.getElementById('f-year').value.trim(),
    size: document.getElementById('f-size').value.trim(),
    country: document.getElementById('f-country').value.trim(),
    jerseyType: document.getElementById('f-jerseyType').value,
    condition: document.getElementById('f-condition').value,
    cost: document.getElementById('f-cost').value.trim(),
    patch1: (formPatches[0] || '').trim(),
    patch2: (formPatches[1] || '').trim(),
    patch3: (formPatches[2] || '').trim(),
    images: formImages.map(function(x) { return x.path; })
  };
  if (editingId) {
    var p = S.products.filter(function(x) { return x.id === editingId; })[0];
    Object.assign(p, data);
  } else {
    data.id = 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    data.status = 'Public';
    S.products.push(data);
  }
  save(); render(); closeForm();
});

document.getElementById('btn-delete').addEventListener('click', function() {
  if (!editingId) return;
  if (!confirm('Delete this listing?')) return;
  S.products = S.products.filter(function(x) { return x.id !== editingId; });
  save(); render(); closeForm();
});

render();
</script>
</body>
</html>
