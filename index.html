<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canucks Jerseys</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:  #000;
  --white:  #fff;
  --grey:   #999;
  --lgrey:  #bbb;
  --bg:     #fff;
  --f: "Helvetica Neue", Helvetica, Arial, sans-serif;
  --hdr1: 80px;
  --top:  80px;
}

html, body { height: 100%; }
body { font-family: var(--f); background: var(--white); color: var(--black); font-size: 14px; line-height: 1.4; -webkit-font-smoothing: antialiased; }

header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.8); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); }
.hdr-top { height: var(--hdr1); display: flex; align-items: center; justify-content: center; padding: 0 48px; position: relative; }
.hdr-left { display: flex; align-items: center; }
.logo { height: 36px; cursor: pointer; }
.hdr-back { font-family: var(--f); font-size: 10px; text-transform: uppercase; line-height: 1; color: #000000; background: none; border: none; cursor: pointer; padding: 0; transition: color 0.15s; display: none; align-items: center; gap: 4px; letter-spacing: 0.04em; position: absolute; left: 48px; top: 50%; transform: translateY(-50%); }
.hdr-back-chevron { font-size: 24px; line-height: 1; display: inline-block; transform: translateY(-2px); }
.hdr-left.detail .hdr-back { display: flex; }
.hdr-back:hover { color: #999999; }

.view { display: none; padding-top: var(--top); min-height: 100vh; }
.view.on { display: block; }
#view-gallery { padding: var(--top) 48px 48px; }
#view-detail .detail-wrap { padding: 0 48px; }
#view-detail { padding-bottom: 48px; }

.hdr-sort { position: absolute; right: 48px; font-family: var(--f); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: #000000; background: transparent url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22%3E%3Cpath fill=%22none%22 stroke=%22%23000000%22 stroke-width=%221.5%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 d=%22M4 6l4 4 4-4%22/%3E%3C/svg%3E') no-repeat right 0 center / 14px; border: none; padding: 6px 18px 6px 0; cursor: pointer; -webkit-appearance: none; appearance: none; border-radius: 4px; }
.hdr-sort:focus { outline: none; }
.hdr-sort:hover { box-shadow: 0 1px 0 0 #000000; border-radius: 0; }
.hdr-left.detail ~ .hdr-sort { display: none; }

.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 48px 16px; }
@media (max-width: 900px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 420px)  { .grid { grid-template-columns: 1fr; } }

.card { background: #f7f7f7; border-radius: 2px; overflow: hidden; cursor: pointer; opacity: 0; animation: cardIn 0.4s ease forwards; }
@keyframes cardIn { to { opacity: 1; } }
.card-img { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: #f7f7f7; position: relative; }
.card-img { transition: background-color 0.6s ease; }
.card-img.skeleton { animation: skeletonPulse 1.2s ease-in-out infinite; animation-delay: inherit; }
.card-img img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.6s ease; }
.card-img img.loaded { opacity: 1; }
.card-img img.card-img-alt { position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; }
.card:hover .card-img:not(.skeleton) img.card-img-alt { opacity: 1; }
@keyframes skeletonPulse { 0%, 100% { background-color: #f7f7f7; } 50% { background-color: #e8e8e8; } }
.card-info   { padding: 20px 24px 52px 24px; opacity: 0; transition: opacity 0.6s ease; }
.card.loaded .card-info { opacity: 1; }
.card-team   { margin-bottom: 5px; }
#grid > div > div.card-info > div.card-title  { margin-top: 9px; margin-bottom: 9px; font-weight: 600; line-height: 1.2; font-size: 13px; }
.card-player { margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#grid > div > div.card-info > div { font-size: 10px; font-weight: 400; line-height: 1; color: #0d0d0d; transition: color 0.2s; }
#grid > div > div.card-info > div:last-child { margin-bottom: 0; }

.empty { grid-column: 1/-1; min-height: 60vh; display: flex; align-items: center; justify-content: center; }
.empty-hed { font-size: 15px; color: var(--lgrey); }

.detail-wrap { display: flex; align-items: flex-start; gap: 48px; }
.detail-imgs { width: 62%; flex-shrink: 0; position: sticky; top: 0; height: calc(100vh - 48px); margin-top: calc(-1 * var(--top)); padding-top: var(--top); overflow-y: auto; }
.detail-imgs img { width: 100%; display: block; background: #ededed; border-radius: 4px; }
.detail-imgs img + img { margin-top: 12px; }
.detail-imgs::-webkit-scrollbar { display: none; }
.detail-panel { width: 38%; min-height: calc(100vh - var(--top)); padding: 32px 0 48px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }

.dp-team, .dp-player, .dp-meta, .dp-extra { margin-bottom: 1px; }
.dp-title  { line-height: 1.15; letter-spacing: -0.01em; margin-bottom: 1px; }
#detail-panel > div.dp-team, #detail-panel > div.dp-title, #detail-panel > div.dp-player, #detail-panel > div.dp-meta, #detail-panel > div.dp-extra { font-size: 11px; font-weight: 400; color: var(--black); }
#detail-panel > div:last-child { margin-bottom: 0; }
.dp-contact { margin-top: 16px; font-size: 11px; color: #999999; }
.dp-contact a { color: inherit; text-decoration: underline; }
.dp-rule { border: none; border-top: 1px solid #0000001a; margin: 0; }
.gallery-contact { text-align: center; margin-top: 64px; margin-bottom: 12px; }

@media (max-width: 768px) {
  .detail-wrap { flex-direction: column; }
  .detail-imgs { width: 100%; position: static; height: auto; margin-top: 0; padding-top: 0; }
  .detail-panel { width: 100%; min-height: auto; padding: 24px 0 40px; }
}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div class="hdr-left">
      <img class="logo" id="logo" src="images/Frame 1.png" alt="Canucks Jerseys">
      <button class="hdr-back" id="btn-back"><span class="hdr-back-chevron">‹</span> Back</button>
    </div>
    <select id="sort-select" class="hdr-sort">
      <option value="default" selected>Default</option>
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="player">Player (A → Z)</option>
    </select>
  </div>
</header>

<main class="view on" id="view-gallery">
  <div class="grid" id="grid"></div>
  <div class="dp-contact gallery-contact">Interested in a jersey?<br><a href="mailto:brandondavelal@gmail.com">Contact</a> to inquire.</div>
</main>

<main class="view" id="view-detail">
  <div class="detail-wrap">
    <div class="detail-imgs" id="detail-imgs"></div>
    <div class="detail-panel" id="detail-panel"></div>
  </div>
</main>

<script>
var ph = function(c) { return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="' + c + '"/></svg>'); };
var fillColors = ['#edebe7', '#d6cfc7', '#c9ddd4', '#e8d6c3'];
var fillImgs = fillColors.map(ph);

var _stored = (function() { try { var r = localStorage.getItem('coll_v8'); return r ? JSON.parse(r) : []; } catch(e) { return []; } })();
var S = { products: _stored, view: 'gallery', sort: 'default' };

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function latestYear(p) {
  var years = String(p.year || '').match(/\d{4}/g);
  if (!years) return null;
  return Math.max.apply(null, years.map(Number));
}

function firstYear(p) {
  var years = String(p.year || '').match(/\d{4}/g);
  if (!years) return null;
  return Math.min.apply(null, years.map(Number));
}

function playerName(p) {
  var parts = String(p.player || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return { first: '', last: '' };
  var last = parts[parts.length - 1];
  var first = parts.slice(0, -1).join(' ');
  return { first: first, last: last };
}

function show(name) {
  S.view = name;
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('on'); });
  document.getElementById('view-' + name).classList.add('on');
  var og = name === 'gallery';
  document.querySelector('.hdr-left').classList.toggle('detail', !og);
  window.scrollTo(0,0);
}

function renderGallery() {
  var g = document.getElementById('grid');
  var list = S.products.filter(function(p) { return p.status !== 'Draft'; });
  if (S.sort === 'newest' || S.sort === 'oldest') {
    list = list.slice().sort(function(a, b) {
      var ya = firstYear(a), yb = firstYear(b);
      if (ya === null && yb === null) return 0;
      if (ya === null) return 1;
      if (yb === null) return -1;
      return S.sort === 'newest' ? yb - ya : ya - yb;
    });
  } else if (S.sort === 'player') {
    list = list.slice().sort(function(a, b) {
      var na = playerName(a), nb = playerName(b);
      if (!na.last && !nb.last) return 0;
      if (!na.last) return 1;
      if (!nb.last) return -1;
      var c = na.last.localeCompare(nb.last);
      if (c !== 0) return c;
      c = na.first.localeCompare(nb.first);
      if (c !== 0) return c;
      var ya = latestYear(a), yb = latestYear(b);
      if (ya === null && yb === null) return 0;
      if (ya === null) return 1;
      if (yb === null) return -1;
      return ya - yb;
    });
  }
  if (!list.length) { g.innerHTML = '<div class="empty"><div class="empty-hed">Nothing here yet.</div></div>'; return; }
  g.innerHTML = list.map(function(p, i) {
    var img = (p.images && p.images.length) ? p.images[0] : fillImgs[0];
    var img2 = (p.images && p.images.length > 1) ? p.images[1] : null;
    var sub  = [p.manufacturer, p.year].filter(Boolean).join(' · ');
    return '<div class="card" data-id="' + esc(p.id) + '" tabindex="0" role="button" style="animation-delay:' + (i * 40) + 'ms">' +
      '<div class="card-img skeleton"><img src="' + img + '" alt="' + esc(p.player) + '" loading="lazy">' +
      (img2 ? '<img class="card-img-alt" src="' + img2 + '" alt="' + esc(p.player) + '" loading="lazy">' : '') +
      '</div><div class="card-info">' +
      (p.team   ? '<div class="card-team">'   + esc(p.team)        + '</div>' : '') +
      '<div class="card-title">' + esc(p.title||'—') + '</div>' +
      (p.player ? '<div class="card-player">' + esc(p.player)      + '</div>' : '') +
      (sub      ? '<div class="card-sub">'    + esc(sub)           + '</div>' : '') +
      '</div></div>';
  }).join('');
  g.querySelectorAll('.card').forEach(function(c) {
    c.addEventListener('click', function() { openDetail(c.dataset.id); });
    c.addEventListener('keydown', function(e) { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); openDetail(c.dataset.id); } });
  });
  var imgs = g.querySelectorAll('.card-img img');
  var remaining = imgs.length;
  var minDelay = 1000;
  var startTime = Date.now();
  var revealAll = function() {
    var wait = Math.max(0, minDelay - (Date.now() - startTime));
    setTimeout(function() {
      imgs.forEach(function(img) {
        img.classList.add('loaded');
        img.parentElement.classList.remove('skeleton');
        img.closest('.card').classList.add('loaded');
      });
    }, wait);
  };
  if (!remaining) revealAll();
  imgs.forEach(function(img) {
    var onDone = function() { if (--remaining <= 0) revealAll(); };
    if (img.complete) onDone(); else { img.addEventListener('load', onDone); img.addEventListener('error', onDone); }
  });
}

function openDetail(id, skipPush) {
  var p = S.products.filter(function(x) { return x.id === id; })[0];
  if (!p) return;
  if (!skipPush) history.pushState({ id: id }, '', '#' + encodeURIComponent(id));
  var imgs = (p.images && p.images.length) ? p.images : fillImgs;
  document.getElementById('detail-imgs').innerHTML = imgs.map(function(src) { return '<img src="' + src + '" alt="' + esc(p.player) + '">'; }).join('');
  var patches = [p.patch1, p.patch2, p.patch3].filter(Boolean);
  var numDesig = [p.number ? '#' + p.number : '', p.designation && p.designation !== 'Blank' ? p.designation : ''].filter(Boolean).join(' · ');
  var extras = [];
  if (p.size)         extras.push(['Size', p.size]);
  var mfr = [p.manufacturer, p.model, p.jerseyType].filter(Boolean).join(' · ');
  var playerLine = [p.player||'', numDesig].filter(Boolean).join(' · ');
  document.getElementById('detail-panel').innerHTML =
    (p.team   ? '<div class="dp-team">'   + esc(p.team)     + '</div>' : '') +
    (p.title  ? '<div class="dp-title">'  + esc(p.title)    + '</div>' : '') +
    (playerLine ? '<div class="dp-player">' + esc(playerLine) + '</div>' : '') +
    (p.year   ? '<div class="dp-meta">'   + esc(p.year)      + '</div>' : '') +
    (patches.length ? '<div class="dp-extra">Patches: ' + esc(patches.join(' · ')) + '</div>' : '') +
    (mfr  ? '<div class="dp-meta">'   + esc(mfr)     + '</div>' : '') +
    extras.map(function(x) { return '<div class="dp-extra">' + esc(x[0]) + ': ' + esc(x[1]) + '</div>'; }).join('') +
    (p.country ? '<div class="dp-extra">' + esc(p.country) + '</div>' : '') +
    '<div class="dp-contact"><hr class="dp-rule"><br>Interested in this jersey?<br><a href="mailto:brandondavelal@gmail.com">Contact</a> to inquire.</div>';
  show('detail');
}

document.getElementById('sort-select').addEventListener('change', function(e) { S.sort = e.target.value; renderGallery(); });

document.getElementById('btn-back').addEventListener('click', function() { history.pushState({}, '', location.pathname + location.search); show('gallery'); renderGallery(); });
document.getElementById('logo').addEventListener('click', function() { if (S.view !== 'gallery') { history.pushState({}, '', location.pathname + location.search); show('gallery'); renderGallery(); } });
document.addEventListener('keydown', function(e) { if (e.key==='Escape' && S.view==='detail') { history.pushState({}, '', location.pathname + location.search); show('gallery'); renderGallery(); } });
window.addEventListener('popstate', function() { route(); });

function route() {
  var id = decodeURIComponent(location.hash.slice(1));
  if (id && S.products.some(function(p) { return p.id === id && p.status !== 'Draft'; })) {
    openDetail(id, true);
  } else {
    show('gallery'); renderGallery();
  }
}

renderGallery(); route();
</script>
</body>
</html>
